<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { glass: 'rgba(30, 41, 59, 0.7)' }
                }
            }
        }
    </script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #000000 100%); color: white; min-height: 100vh; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1rem;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 pb-24 relative overflow-x-hidden">

    <header class="flex justify-between items-center mb-6 pt-4">
        <h1 class="text-2xl font-semibold tracking-tight">Overview</h1>
        <button onclick="toggleSettings()" class="p-2 glass-panel rounded-full w-10 h-10 flex items-center justify-center">
            ⚙️
        </button>
    </header>

    <main id="dashboard" class="hidden grid grid-cols-2 gap-4">
        <div class="glass-panel p-4 flex flex-col justify-center items-center text-center">
            <span class="text-xs text-gray-400 uppercase tracking-wider mb-1">To Lose</span>
            <span id="metric-countdown" class="text-2xl font-bold">0 kg</span>
        </div>
        <div class="glass-panel p-4 flex flex-col justify-center items-center text-center">
            <span class="text-xs text-gray-400 uppercase tracking-wider mb-1">Progress</span>
            <span id="metric-progress" class="text-2xl font-bold text-green-400">0%</span>
        </div>
        <div class="glass-panel p-4 flex flex-col justify-center items-center text-center col-span-2">
            <span class="text-xs text-gray-400 uppercase tracking-wider mb-1">7-Day Deficit</span>
            <span id="metric-weekly-deficit" class="text-3xl font-bold text-blue-400">0 kcal</span>
        </div>
        <div class="glass-panel p-4 flex flex-col justify-center items-center text-center">
            <span class="text-xs text-gray-400 uppercase tracking-wider mb-1">Net Cals (Today)</span>
            <span id="metric-net-cals" class="text-xl font-bold">0 kcal</span>
        </div>
        <div class="glass-panel p-4 flex flex-col justify-center items-center text-center">
            <span class="text-xs text-gray-400 uppercase tracking-wider mb-1">Total to Burn</span>
            <span id="metric-total-burn" class="text-xl font-bold">0 kcal</span>
        </div>
        <div class="glass-panel p-4 flex flex-col justify-center items-center text-center col-span-2">
            <span class="text-xs text-gray-400 uppercase tracking-wider mb-1">Days Remaining</span>
            <span id="metric-days-left" class="text-3xl font-bold">0</span>
        </div>
    </main>

    <div class="fixed bottom-6 left-0 right-0 flex justify-center z-40" id="fab-container">
        <button onclick="toggleLogModal()" class="glass-panel bg-blue-600 bg-opacity-80 w-16 h-16 rounded-full flex items-center justify-center text-3xl shadow-[0_0_20px_rgba(37,99,235,0.4)]">
            +
        </button>
    </div>

    <div id="setup-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-60 backdrop-blur-sm">
        <div class="glass-panel w-full max-w-md p-6 relative">
            <button onclick="closeSettingsIfConfigured()" class="absolute top-4 right-4 text-gray-400 font-bold" id="close-setup-btn">✕</button>
            <h2 class="text-xl font-semibold mb-4 border-b border-gray-700 pb-2">User Configuration</h2>
            <form id="setup-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Current Weight (kg)</label>
                        <input type="number" id="setup-weight" required step="0.1" class="w-full bg-black bg-opacity-50 border border-gray-600 rounded p-2 text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Height (cm)</label>
                        <input type="number" id="setup-height" required class="w-full bg-black bg-opacity-50 border border-gray-600 rounded p-2 text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Age</label>
                        <input type="number" id="setup-age" required class="w-full bg-black bg-opacity-50 border border-gray-600 rounded p-2 text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Gender</label>
                        <select id="setup-gender" class="w-full bg-black bg-opacity-50 border border-gray-600 rounded p-2 text-white">
                            <option value="m">Male</option>
                            <option value="f">Female</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Goal Weight (kg)</label>
                    <input type="number" id="setup-goal-weight" required step="0.1" class="w-full bg-black bg-opacity-50 border border-gray-600 rounded p-2 text-white">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Timeframe (Days)</label>
                    <input type="number" id="setup-timeframe" required class="w-full bg-black bg-opacity-50 border border-gray-600 rounded p-2 text-white">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white rounded p-3 font-semibold mt-4">Save Configuration</button>
            </form>
        </div>
    </div>

    <div id="log-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-60 backdrop-blur-sm">
        <div class="glass-panel w-full max-w-md p-6 relative">
            <button onclick="toggleLogModal()" class="absolute top-4 right-4 text-gray-400 font-bold">✕</button>
            <h2 class="text-xl font-semibold mb-4 border-b border-gray-700 pb-2">Daily Log</h2>
            <form id="log-form" class="space-y-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Today's Weight (kg)</label>
                    <input type="number" id="log-weight" required step="0.1" class="w-full bg-black bg-opacity-50 border border-gray-600 rounded p-2 text-white">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Calories Consumed</label>
                    <input type="number" id="log-cal-in" required class="w-full bg-black bg-opacity-50 border border-gray-600 rounded p-2 text-white">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Active Calories Burnt (Exc. BMR)</label>
                    <input type="number" id="log-cal-out" required class="w-full bg-black bg-opacity-50 border border-gray-600 rounded p-2 text-white">
                </div>
                <button type="submit" class="w-full bg-green-600 text-white rounded p-3 font-semibold mt-4">Save Log</button>
            </form>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'fitness_app_data';
        let appData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { config: null, logs: [], startDate: null };

        // DOM Elements
        const elDashboard = document.getElementById('dashboard');
        const elSetupModal = document.getElementById('setup-modal');
        const elLogModal = document.getElementById('log-modal');
        const elCloseSetupBtn = document.getElementById('close-setup-btn');
        const elFab = document.getElementById('fab-container');

        // Initialize App
        function init() {
            if (!appData.config) {
                elCloseSetupBtn.classList.add('hidden');
                elSetupModal.classList.remove('hidden');
                elFab.classList.add('hidden');
            } else {
                elSetupModal.classList.add('hidden');
                elDashboard.classList.remove('hidden');
                elFab.classList.remove('hidden');
                updateDashboard();
            }
        }

        // Setup Form Submit
        document.getElementById('setup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            appData.config = {
                startWeight: parseFloat(document.getElementById('setup-weight').value),
                height: parseFloat(document.getElementById('setup-height').value),
                age: parseInt(document.getElementById('setup-age').value),
                gender: document.getElementById('setup-gender').value,
                goalWeight: parseFloat(document.getElementById('setup-goal-weight').value),
                timeframe: parseInt(document.getElementById('setup-timeframe').value)
            };
            if (!appData.startDate) appData.startDate = new Date().toISOString();
            saveData();
            init();
        });

        // Log Form Submit
        document.getElementById('log-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const today = new Date().toISOString().split('T')[0];
            const newLog = {
                date: today,
                weight: parseFloat(document.getElementById('log-weight').value),
                calsIn: parseInt(document.getElementById('log-cal-in').value),
                calsOut: parseInt(document.getElementById('log-cal-out').value)
            };
            
            // Overwrite if log exists for today
            const existingIndex = appData.logs.findIndex(l => l.date === today);
            if (existingIndex > -1) appData.logs[existingIndex] = newLog;
            else appData.logs.push(newLog);
            
            saveData();
            toggleLogModal();
            updateDashboard();
        });

        // Calculations & UI Updates
        function calculateBMR(weight, height, age, gender) {
            // Mifflin-St Jeor Equation
            let bmr = (10 * weight) + (6.25 * height) - (5 * age);
            return gender === 'm' ? bmr + 5 : bmr - 161;
        }

        function updateDashboard() {
            const { config, logs, startDate } = appData;
            const currentWeight = logs.length > 0 ? logs[logs.length - 1].weight : config.startWeight;
            const bmr = calculateBMR(currentWeight, config.height, config.age, config.gender);
            
            // 1. Countdown to weight loss
            const weightToLose = (currentWeight - config.goalWeight).toFixed(1);
            document.getElementById('metric-countdown').innerText = weightToLose > 0 ? `${weightToLose} kg` : 'Goal Reached!';

            // 2. % of Goal Achieved
            const totalToLose = config.startWeight - config.goalWeight;
            const lostSoFar = config.startWeight - currentWeight;
            let percent = totalToLose > 0 ? (lostSoFar / totalToLose) * 100 : 0;
            percent = Math.max(0, Math.min(100, percent));
            document.getElementById('metric-progress').innerText = `${percent.toFixed(1)}%`;

            // 3. Weekly Deficit
            const msInDay = 24 * 60 * 60 * 1000;
            const now = new Date();
            let weeklyDeficit = 0;
            logs.forEach(log => {
                const logDate = new Date(log.date);
                if ((now - logDate) / msInDay <= 7) {
                    const dailyDeficit = (bmr + log.calsOut) - log.calsIn;
                    weeklyDeficit += dailyDeficit;
                }
            });
            document.getElementById('metric-weekly-deficit').innerText = `${Math.round(weeklyDeficit)} kcal`;

            // 4. Net Calories (Consumed - BMR - Activity) for latest log
            let netCals = 0;
            if (logs.length > 0) {
                const lastLog = logs[logs.length - 1];
                netCals = lastLog.calsIn - bmr - lastLog.calsOut;
            }
            document.getElementById('metric-net-cals').innerText = `${Math.round(netCals)} kcal`;

            // 5. Calories to Burn
            const calsPerKgFat = 7700;
            const totalCalsToBurn = (currentWeight - config.goalWeight) * calsPerKgFat;
            document.getElementById('metric-total-burn').innerText = totalCalsToBurn > 0 ? `${Math.round(totalCalsToBurn)} kcal` : '0 kcal';

            // 6. Days to go
            const start = new Date(startDate);
            const daysElapsed = Math.floor((now - start) / msInDay);
            const daysLeft = config.timeframe - daysElapsed;
            document.getElementById('metric-days-left').innerText = Math.max(0, daysLeft);
        }

        // Utility Functions
        function toggleSettings() {
            if (appData.config) {
                document.getElementById('setup-weight').value = appData.config.startWeight;
                document.getElementById('setup-height').value = appData.config.height;
                document.getElementById('setup-age').value = appData.config.age;
                document.getElementById('setup-gender').value = appData.config.gender;
                document.getElementById('setup-goal-weight').value = appData.config.goalWeight;
                document.getElementById('setup-timeframe').value = appData.config.timeframe;
                elCloseSetupBtn.classList.remove('hidden');
            }
            elSetupModal.classList.toggle('hidden');
        }

        function closeSettingsIfConfigured() {
            if (appData.config) elSetupModal.classList.add('hidden');
        }

        function toggleLogModal() {
            const today = new Date().toISOString().split('T')[0];
            const existingLog = appData.logs.find(l => l.date === today);
            
            document.getElementById('log-weight').value = existingLog ? existingLog.weight : (appData.logs.length > 0 ? appData.logs[appData.logs.length-1].weight : appData.config.startWeight);
            document.getElementById('log-cal-in').value = existingLog ? existingLog.calsIn : '';
            document.getElementById('log-cal-out').value = existingLog ? existingLog.calsOut : '';
            
            elLogModal.classList.toggle('hidden');
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
        }

        // Run
        init();
    </script>
</body>
</html>
